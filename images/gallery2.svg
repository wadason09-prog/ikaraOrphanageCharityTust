<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5C3524"/>
      <stop offset="1" stop-color="#3B2E52"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg2)"/>
  <g opacity=".1" fill="#F2D68A">
    <circle cx="50" cy="60" r="3"/><circle cx="350" cy="70" r="3"/><circle cx="320" cy="330" r="3"/>
    <circle cx="70" cy="340" r="3"/><circle cx="30" cy="200" r="3"/>
  </g>
  <circle cx="200" cy="185" r="120" fill="#D9A441" opacity=".12"/>
  <!-- heart -->
  <path d="M200 260 C 120 200 90 150 130 115 C 160 88 195 100 200 130 C 205 100 240 88 270 115 C 310 150 280 200 200 260 Z" fill="#C2542C"/>
  <!-- pulse line -->
  <path d="M110 185 h50 l14 -34 20 60 16 -40 10 14 h70" fill="none" stroke="#F7EFDD" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- cross badge -->
  <g transform="translate(200,300)">
    <circle r="28" fill="#F2D68A"/>
    <rect x="-5" y="-15" width="10" height="30" fill="#14213A"/>
    <rect x="-15" y="-5" width="30" height="10" fill="#14213A"/>
  </g>
  <text x="200" y="360" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#F7EFDD">Healthcare</text>
</svg>
